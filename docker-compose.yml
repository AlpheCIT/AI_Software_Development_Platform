version: '3.8'

name: ai-software-development-platform

services:
  # ArangoDB Database
  arangodb:
    image: arangodb:3.12.5
    container_name: aisdp_db
    restart: unless-stopped
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_PASSWORD:?ARANGO_PASSWORD must be set in .env}
      ARANGO_NO_AUTH: 0
    ports:
      - "${ARANGO_PORT:-8529}:8529"
    volumes:
      - arangodb_data:/var/lib/arangodb3
      - arangodb_apps:/var/lib/arangodb3-apps
    networks:
      - aisdp_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8529/_api/version"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis (for caching and session storage)
  redis:
    image: redis:7-alpine
    container_name: aisdp_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - aisdp_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # API Gateway Service
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: aisdp_api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8000
      - ARANGO_URL=http://arangodb:8529
      - ARANGO_DATABASE=${ARANGO_DATABASE:-ARANGO_AISDP_DB}
      - ARANGO_USERNAME=${ARANGO_USERNAME:-root}
      - ARANGO_PASSWORD=${ARANGO_PASSWORD:?ARANGO_PASSWORD must be set in .env}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-aisdp-jwt-secret}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - JIRA_URL=${JIRA_URL}
      - JIRA_USERNAME=${JIRA_USERNAME}
      - JIRA_TOKEN=${JIRA_TOKEN}
      - WEBSOCKET_URL=http://websocket:4001
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    networks:
      - aisdp_network
    depends_on:
      arangodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # WebSocket Service for Real-time Communication
  websocket:
    build:
      context: .
      dockerfile: services/websocket/Dockerfile
    container_name: aisdp_websocket
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4001
      - WS_PORT=4001
      - CORS_ORIGIN=http://localhost:3000,http://localhost:5173
      - API_BASE_URL=http://api-gateway:8000
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=info
    ports:
      - "${WEBSOCKET_PORT:-4001}:4001"
    networks:
      - aisdp_network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Vector Search Service
  vector-search:
    build:
      context: .
      dockerfile: services/vector-search/Dockerfile
    container_name: aisdp_vector_search
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VECTOR_SEARCH_PORT=8005
      - ARANGO_URL=http://arangodb:8529
      - ARANGO_DATABASE=${ARANGO_DATABASE:-ARANGO_AISDP_DB}
      - ARANGO_USERNAME=${ARANGO_USERNAME:-root}
      - ARANGO_PASSWORD=${ARANGO_PASSWORD:?ARANGO_PASSWORD must be set in .env}
      - FRONTEND_URL=http://localhost:3000
      - EMBEDDING_PROVIDER=openai
      - EMBEDDING_MODEL=text-embedding-ada-002
      - EMBEDDING_DIMENSION=1536
      - DEFAULT_SIMILARITY_THRESHOLD=0.7
      - MAX_RESULTS_LIMIT=1000
      - CACHE_TTL_SECONDS=3600
      - ENABLE_HYBRID_SEARCH=true
      - LOG_LEVEL=info
    ports:
      - "${VECTOR_SEARCH_PORT:-8005}:8005"
    volumes:
      - ./logs:/app/logs
    networks:
      - aisdp_network
    depends_on:
      arangodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend Web Dashboard
  web-dashboard:
    build:
      context: .
      dockerfile: apps/web-dashboard/Dockerfile
      target: production
    container_name: aisdp_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=http://localhost:4001
      - VITE_APP_TITLE=AI Software Development Platform
      - VITE_APP_VERSION=2.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - aisdp_network
    depends_on:
      websocket:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  arangodb_data:
    driver: local
    name: aisdp_arangodb_data
  arangodb_apps:
    driver: local  
    name: aisdp_arangodb_apps
  redis_data:
    driver: local
    name: aisdp_redis_data

networks:
  aisdp_network:
    driver: bridge
    name: aisdp_network
    ipam:
      config:
        - subnet: 172.21.0.0/16
